name: Test SARS-CoV-2 nanopore workflow

on: [pull_request, workflow_dispatch]

run-name: nanopore

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Clean up Disk space
        uses: jlumbroso/free-disk-space@main

      - name: Install Nextflow
        run: |
          wget -qO- get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Download reads
        run: |
          mkdir nanopore
          cd nanopore
          wget --show-progress=false ftp://ftp.sra.ebi.ac.uk/vol1/fastq/SRR382/090/SRR38226090/SRR38226090_1.fastq.gz
          wget --show-progress=false ftp://ftp.sra.ebi.ac.uk/vol1/fastq/SRR382/089/SRR38226089/SRR38226089_1.fastq.gz
          cd ../

      - name: Run Cecret
        run: |
          nextflow run . -profile docker -c .github/workflows/github_actions.config --nanopore nanopore

          ls cecret*
            
          ls cecret/consensus/*consensus.fa
          
          head cecret*/cecret_results.txt

      - name: Clean
        run: rm -rf work .nextflow*
